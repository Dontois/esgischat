; Augmente les limites d'upload par défaut de PHP (souvent 2 Mo), trop
; basses pour des photos de smartphone modernes (3 à 10 Mo).
; Ce fichier est pris en compte automatiquement par PHP (mod_php ET PHP-FPM),
; contrairement à .htaccess qui ne fonctionne qu'avec mod_php.
; Un délai de quelques minutes (cache PHP) peut être nécessaire après la
; première mise en ligne pour que ces valeurs prennent effet.
upload_max_filesize = 12M
post_max_size = 15M
